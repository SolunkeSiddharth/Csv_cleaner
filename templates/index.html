<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>CSV Missing Value Cleaner</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f4f6f9;
}

.main-card{
max-width:800px;
margin:auto;
margin-top:60px;
padding:30px;
border-radius:12px;
box-shadow:0px 5px 20px rgba(0,0,0,0.1);
background:white;
}

.title{
font-weight:600;
text-align:center;
margin-bottom:25px;
}

.column-box{
padding:10px;
border-bottom:1px solid #eee;
}

.clean-btn{
width:100%;
margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

<div class="main-card">

<h2 class="title">CSV Missing Value Cleaner</h2>

<!-- Upload Form -->
<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">Upload CSV File</label>
<input type="file" name="file" class="form-control" required>
</div>

<button class="btn btn-primary w-100">Upload Dataset</button>

</form>

{% if columns is defined %}

<hr>

<h5 class="mb-3">Select Cleaning Method for Each Column</h5>

<form action="/clean" method="POST">

<input type="hidden" name="filename" value="{{filename}}">

{% for col in columns %}

<div class="column-box row align-items-center">

<div class="col-md-4">
<strong>{{col}}</strong>
</div>

<div class="col-md-4 text-danger">
Missing: {{missing_counts[col]}}
</div>

<div class="col-md-4">

<select name="{{col}}" class="form-select">

<option value="mean">Mean</option>
<option value="median">Median</option>
<option value="mode">Mode</option>
<option value="drop">Drop Column</option>

</select>

</div>

</div>


{% endfor %}

<button class="btn btn-success clean-btn">
Clean & Download CSV
</button>

</form>

{% endif %}

</div>

</div>

</body>
</html>
